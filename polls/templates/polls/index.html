<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>My Notes</title>
</head>
<body>
    <h1>My Notes</h1>
    <p>Logged in as {{ request.user.username }} | <a href="/accounts/logout/">Logout</a></p>

    <h2>Create a note</h2>
    <form method="post">
        {% csrf_token %}
        <p><input type="text" name="title" placeholder="Title"></p>
        <p><textarea name="body" placeholder="Body"></textarea></p>
        <button type="submit">Save</button>
    </form>

    <h2>Your notes</h2>
    <ul>
        {% for note in notes %}
            <li>
                <a href="{% url 'note_detail' note.id %}">#{{ note.id }} {{ note.title }}</a>
            </li>
        {% empty %}
            <li>No notes yet.</li>
        {% endfor %}
    </ul>
</body>
</html>
